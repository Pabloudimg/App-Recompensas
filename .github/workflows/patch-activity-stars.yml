name: Patch activity star display

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch activity star display
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          main_path = Path('src/main.jsx')
          main_text = main_path.read_text(encoding='utf-8')

          if 'className="activity-stars"' not in main_text:
              pattern = re.compile(
                  r"(?P<indent>\s*)<h3>\{activity\.title\}</h3>\s*\n\s*<p>\{activity\.points\} estrela\{activity\.points > 1 \? 's' : ''\}</p>",
                  re.MULTILINE,
              )

              def replacement(match):
                  indent = match.group('indent')
                  return (
                      f'{indent}<h3 className="mission-heading">\n'
                      f'{indent}  <span>{{activity.title}}</span>\n'
                      f'{indent}  <sup className="activity-stars" aria-label={{`${{activity.points}} estrela${{activity.points > 1 ? \'s\' : \'\'}}`}}>\n'
                      f'{indent}    {{Array.from({{ length: Math.max(0, Math.min(99, Number(activity.points) || 0)) }}, (_, starIndex) => <span key={{starIndex}}>⭐</span>)}}\n'
                      f'{indent}  </sup>\n'
                      f'{indent}</h3>'
                  )

              main_text, count = pattern.subn(replacement, main_text, count=1)
              if count != 1:
                  raise SystemExit('Trecho da tela Hoje não encontrado para substituir.')
              main_path.write_text(main_text, encoding='utf-8')

          css_path = Path('src/styles.css')
          css_text = css_path.read_text(encoding='utf-8')

          if '.activity-stars' not in css_text:
              target = '.mission-title h3 { margin: 0 0 2px; letter-spacing: -0.02em; }\n'
              addition = (
                  target
                  + '.mission-heading { display: inline-flex; align-items: flex-start; gap: 6px; flex-wrap: wrap; margin-right: 4px; }\n'
                  + '.activity-stars { display: inline-flex; gap: 1px; max-width: min(12rem, 42vw); flex-wrap: wrap; transform: translateY(-0.35em); font-size: 0.62em; line-height: 1; letter-spacing: -0.12em; margin-left: 2px; }\n'
                  + '.activity-stars span { display: inline-block; }\n'
              )
              if target not in css_text:
                  raise SystemExit('Trecho de CSS não encontrado para inserir estrelas.')
              css_path.write_text(css_text.replace(target, addition), encoding='utf-8')

          Path('.github/workflows/patch-activity-stars.yml').unlink(missing_ok=True)
          PY

      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main.jsx src/styles.css .github/workflows/patch-activity-stars.yml
          git commit -m "Exibir estrelas da atividade como icones"
          git push
