name: Apply week and activity star changes

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  apply-and-deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply requested changes
        run: |
          python3 <<'PY'
          from pathlib import Path

          main_path = Path('src/main.jsx')
          css_path = Path('src/styles.css')
          workflow_path = Path('.github/workflows/patch-activity-stars.yml')

          main_text = main_path.read_text(encoding='utf-8')
          css_text = css_path.read_text(encoding='utf-8')

          def replace_once(text, old, new):
              return text.replace(old, new, 1) if old in text else text

          old_week_call = """        {activeTab === 'week' && <WeekPanel summaries={weeklySummaries} rewards={data.rewards} selectedDate={selectedDate} rewardRedemptions={data.rewardRedemptions} transfers={data.transfers} onTogglePrize={togglePrizeRedemption} onTransferBalance={transferBalanceToNextWeek} />}"""
          new_week_call = """        {activeTab === 'week' && <WeekPanel summaries={weeklySummaries.filter((summary) => summary.child.id === selectedChildId)} rewards={data.rewards} selectedDate={selectedDate} rewardRedemptions={data.rewardRedemptions} transfers={data.transfers} onTogglePrize={togglePrizeRedemption} onTransferBalance={transferBalanceToNextWeek} />}"""
          main_text = replace_once(main_text, old_week_call, new_week_call)

          old_today_points = """                  <h3>{activity.title}</h3>
                  <p>{activity.points} estrela{activity.points > 1 ? 's' : ''}</p>"""
          new_today_points = """                  <h3 className="mission-heading">
                    <span>{activity.title}</span>
                    <sup className="activity-stars" aria-label={`${activity.points} estrela${activity.points > 1 ? 's' : ''}`}>
                      {Array.from({ length: Math.max(0, Math.min(99, Number(activity.points) || 0)) }, (_, starIndex) => <span key={starIndex}>⭐</span>)}
                    </sup>
                  </h3>"""
          if 'className="activity-stars"' not in main_text:
              main_text = replace_once(main_text, old_today_points, new_today_points)

          old_week_metrics = """              <ProgressBar value={summary.percentage} />
              <div className="big-number">{summary.percentage}%</div>
              <p className="summary-points">⭐ {summary.points} estrelas acumuladas</p>
              <p className="summary-finance">↔️ {transferred} estrelas transferidas</p>
              <p className="summary-finance">🏆 {used} estrelas utilizadas</p>
              <p className="summary-finance balance-line">🧾 {balance} moedas disponíveis</p>
              <p className="reward-tier">{getTierMessage(summary.percentage)}</p>"""
          new_week_metrics = """              <ProgressBar value={summary.percentage} />
              <div className="week-metrics">
                <p className="summary-points">⭐ <strong className="metric-value good">{summary.points}</strong> estrelas obtidas na semana</p>
                <p className="summary-finance">↔️ <strong className="metric-value good">{transferred}</strong> estrelas transferidas</p>
                <p className="summary-finance">🏆 <strong className="metric-value bad">{used}</strong> estrelas utilizadas</p>
                <p className="summary-finance balance-line">🧾 <strong className="metric-value good">{balance}</strong> estrelas disponíveis</p>
              </div>"""
          if 'className="week-metrics"' not in main_text:
              main_text = replace_once(main_text, old_week_metrics, new_week_metrics)

          old_prize_icon = """                      >
                        <span className="prize-icon">{reward.icon}</span>"""
          new_prize_icon = """                      >
                        {isRedeemed && <span className="redeemed-check" aria-hidden="true">✓</span>}
                        <span className="prize-icon">{reward.icon}</span>"""
          if 'className="redeemed-check"' not in main_text:
              main_text = replace_once(main_text, old_prize_icon, new_prize_icon)

          old_acc_icon = """                  >
                    <span className="prize-icon">🪙</span>"""
          new_acc_icon = """                  >
                    {nextTransfer > 0 && <span className="redeemed-check" aria-hidden="true">✓</span>}
                    <span className="prize-icon">🪙</span>"""
          if '{nextTransfer > 0 && <span className="redeemed-check"' not in main_text:
              main_text = replace_once(main_text, old_acc_icon, new_acc_icon)

          main_path.write_text(main_text, encoding='utf-8')

          css_add = """

/* Ajustes: estrelas das atividades e resumo semanal */
.mission-heading { display: inline-flex; align-items: flex-start; gap: 6px; flex-wrap: wrap; margin-right: 4px; }
.activity-stars { display: inline-flex; gap: 1px; max-width: min(12rem, 42vw); flex-wrap: wrap; transform: translateY(-0.35em); font-size: 0.62em; line-height: 1; letter-spacing: -0.12em; margin-left: 2px; }
.activity-stars span { display: inline-block; }
.summary-grid { grid-template-columns: 1fr; }
.week-metrics { display: grid; gap: 5px; margin-top: 12px; }
.metric-value { font-size: 1.08em; font-weight: 950; }
.metric-value.good { color: var(--blue); }
.metric-value.bad { color: var(--red); }
.prize-claim-card { position: relative; }
.redeemed-check { position: absolute; top: 9px; right: 9px; display: grid; width: 25px; height: 25px; place-items: center; border-radius: 999px; background: var(--green); color: white; font-size: .95rem; font-weight: 950; box-shadow: 0 8px 18px rgba(34, 197, 94, .28); }
"""
          if '.activity-stars' not in css_text or '.week-metrics' not in css_text or '.redeemed-check' not in css_text:
              css_text = css_text.rstrip() + css_add
          css_path.write_text(css_text, encoding='utf-8')

          workflow_path.unlink(missing_ok=True)
          PY

      - name: Commit source changes
        run: |
          if git diff --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main.jsx src/styles.css .github/workflows/patch-activity-stars.yml
          git commit -m "Ajustar tela Semana e estrelas das atividades"
          git push

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Confirm Vite installed
        run: npx vite --version

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
